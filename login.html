<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şantiye Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background-color: #12121288;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            background: #1f516ce4;
            box-shadow: 0 10px 30px rgba(113, 67, 67, 0.5);
            border-top: 5px solid #e67e22;
        }

        .btn-warning {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h3 class="text-center mb-4">🚧 Şantiye Girişi</h3>
        <div class="mb-3">
            <label class="form-label text-muted">Kullanıcı Adı</label>
            <input type="text" id="kullaniciAdi" class="form-control bg-dark text-white border-secondary"
                placeholder="patron">
        </div>
        <div class="mb-4">
            <label class="form-label text-muted">Şifre</label>
            <input type="password" id="sifre" class="form-control bg-dark text-white border-secondary"
                placeholder="****">
        </div>
        <button class="btn btn-warning w-100" onclick="girisYap()">Giriş Yap</button>
    </div>

    <script>
        const BASE_URL = 'http://localhost:5095/api'; // C# Backend adresin

        async function girisYap() {
            const kAdi = document.getElementById('kullaniciAdi').value;
            const sifre = document.getElementById('sifre').value;

            if (!kAdi || !sifre) return Swal.fire('Hop!', 'Kullanıcı adı ve şifre boş olamaz.', 'warning');

            try {
                const res = await fetch(`${BASE_URL}/Auth/Giris`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ kullaniciAdi: kAdi, sifre: sifre })
                });

                if (!res.ok) throw new Error("Kullanıcı adı veya şifre hatalı!");

                const data = await res.json();

                // 🚀 BİLET KESİLİYOR: Adamın adını cüzdana (localStorage) koyuyoruz
                localStorage.setItem('santiyeAktifKullanici', data.adSoyad);
                localStorage.setItem('aktifFirmaId', data.firmaId);

                Swal.fire({
                    title: 'Hoş geldin Şef!',
                    text: 'Şantiye ekranına alınıyorsun...',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.replace('index.html'); // Ana sayfaya gönder
                });

            } catch (error) {
                Swal.fire('Hata', error.message, 'error');
            }
        }
    </script>
</body>

</html>
